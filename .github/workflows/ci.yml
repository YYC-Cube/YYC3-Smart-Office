name: CI - Quality Gate

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint
        continue-on-error: true

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Test
        run: npx jest --ci --coverage --coverageReporters=text
        env:
          JWT_SECRET: ci-test-jwt-secret-key-min-32-chars-long
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_test
        continue-on-error: true

      - name: Build
        run: pnpm build
        env:
          JWT_SECRET: ci-build-jwt-secret-key-min-32-chars-long
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_test
          SKIP_ENV_VALIDATION: true
